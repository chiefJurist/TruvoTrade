version: '3.8'

services:
  app:
    build: .
    container_name: laravel_app
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Asus1234
      MYSQL_DATABASE: truvotrade
      MYSQL_USER: emeka
      MYSQL_PASSWORD: Asus1234
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: laravel_redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: